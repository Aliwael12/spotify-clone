<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="700" y="50" font-size="36" fill="#1DB954" text-anchor="middle" font-weight="bold">🛠️ Tech Stack & Dependencies</text>
  
  <!-- Frontend Column -->
  <g id="frontend">
    <rect x="50" y="120" width="320" height="800" fill="#282828" stroke="#1DB954" stroke-width="2" rx="8"/>
    <text x="210" y="160" font-size="20" fill="#1DB954" text-anchor="middle" font-weight="bold">Frontend Stack</text>
    
    <!-- React -->
    <rect x="70" y="190" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="210" y="215" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⚛️ React.js</text>
    <text x="210" y="240" font-size="11" fill="#b3b3b3" text-anchor="middle">Component-based UI</text>
    <text x="210" y="255" font-size="11" fill="#b3b3b3" text-anchor="middle">State Management</text>
    
    <!-- CSS -->
    <rect x="70" y="290" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="210" y="315" font-size="14" fill="white" text-anchor="middle" font-weight="bold">💅 CSS3</text>
    <text x="210" y="340" font-size="11" fill="#b3b3b3" text-anchor="middle">Responsive Design</text>
    <text x="210" y="355" font-size="11" fill="#b3b3b3" text-anchor="middle">Modern Styling</text>
    
    <!-- HTML -->
    <rect x="70" y="390" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="210" y="415" font-size="14" fill="white" text-anchor="middle" font-weight="bold">📄 HTML5</text>
    <text x="210" y="440" font-size="11" fill="#b3b3b3" text-anchor="middle">Semantic Markup</text>
    <text x="210" y="455" font-size="11" fill="#b3b3b3" text-anchor="middle">Accessibility</text>
    
    <!-- JavaScript -->
    <rect x="70" y="490" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="210" y="515" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⚙️ JavaScript (89.3%)</text>
    <text x="210" y="540" font-size="11" fill="#b3b3b3" text-anchor="middle">DOM Manipulation</text>
    <text x="210" y="555" font-size="11" fill="#b3b3b3" text-anchor="middle">Event Handling</text>
    
    <!-- Axios/Fetch -->
    <rect x="70" y="590" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="210" y="615" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🌐 HTTP Client</text>
    <text x="210" y="640" font-size="11" fill="#b3b3b3" text-anchor="middle">API Requests</text>
    <text x="210" y="655" font-size="11" fill="#b3b3b3" text-anchor="middle">Data Fetching</text>
    
    <!-- Styling -->
    <rect x="70" y="690" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="210" y="715" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🎨 CSS Frameworks</text>
    <text x="210" y="740" font-size="11" fill="#b3b3b3" text-anchor="middle">Flexbox/Grid</text>
    <text x="210" y="755" font-size="11" fill="#b3b3b3" text-anchor="middle">Animations</text>
  </g>
  
  <!-- Backend Column -->
  <g id="backend">
    <rect x="410" y="120" width="320" height="800" fill="#282828" stroke="#1DB954" stroke-width="2" rx="8"/>
    <text x="570" y="160" font-size="20" fill="#1DB954" text-anchor="middle" font-weight="bold">Backend Stack</text>
    
    <!-- Node.js -->
    <rect x="430" y="190" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="570" y="215" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🟢 Node.js</text>
    <text x="570" y="240" font-size="11" fill="#b3b3b3" text-anchor="middle">Runtime Environment</text>
    <text x="570" y="255" font-size="11" fill="#b3b3b3" text-anchor="middle">V8 Engine</text>
    
    <!-- Express.js -->
    <rect x="430" y="290" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="570" y="315" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⚡ Express.js</text>
    <text x="570" y="340" font-size="11" fill="#b3b3b3" text-anchor="middle">Web Framework</text>
    <text x="570" y="355" font-size="11" fill="#b3b3b3" text-anchor="middle">Route Handling</text>
    
    <!-- Middleware -->
    <rect x="430" y="390" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="570" y="415" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🔄 Middleware</text>
    <text x="570" y="440" font-size="11" fill="#b3b3b3" text-anchor="middle">CORS, Body Parser</text>
    <text x="570" y="455" font-size="11" fill="#b3b3b3" text-anchor="middle">Authentication</text>
    
    <!-- Authentication -->
    <rect x="430" y="490" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="570" y="515" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🔐 OAuth 2.0</text>
    <text x="570" y="540" font-size="11" fill="#b3b3b3" text-anchor="middle">Token Management</text>
    <text x="570" y="555" font-size="11" fill="#b3b3b3" text-anchor="middle">Session Control</text>
    
    <!-- Utilities -->
    <rect x="430" y="590" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="570" y="615" font-size="14" fill="white" text-anchor="middle" font-weight="bold">📦 Utilities</text>
    <text x="570" y="640" font-size="11" fill="#b3b3b3" text-anchor="middle">dotenv (Config)</text>
    <text x="570" y="655" font-size="11" fill="#b3b3b3" text-anchor="middle">Axios (HTTP)</text>
    
    <!-- Error Handling -->
    <rect x="430" y="690" width="280" height="80" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="570" y="715" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⚠️ Error Handling</text>
    <text x="570" y="740" font-size="11" fill="#b3b3b3" text-anchor="middle">Try-Catch Blocks</text>
    <text x="570" y="755" font-size="11" fill="#b3b3b3" text-anchor="middle">Status Codes</text>
  </g>
  
  <!-- APIs Column -->
  <g id="apis">
    <rect x="770" y="120" width="320" height="800" fill="#282828" stroke="#1DB954" stroke-width="2" rx="8"/>
    <text x="930" y="160" font-size="20" fill="#1DB954" text-anchor="middle" font-weight="bold">External APIs</text>
    
    <!-- Spotify Web API -->
    <rect x="790" y="190" width="280" height="100" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="930" y="215" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🎵 Spotify Web API</text>
    <text x="930" y="240" font-size="11" fill="#b3b3b3" text-anchor="middle">Search Tracks</text>
    <text x="930" y="255" font-size="11" fill="#b3b3b3" text-anchor="middle">Get Playlists</text>
    <text x="930" y="270" font-size="11" fill="#b3b3b3" text-anchor="middle">User Profile Data</text>
    
    <!-- Spotify Web Playback -->
    <rect x="790" y="310" width="280" height="100" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="930" y="335" font-size="14" fill="white" text-anchor="middle" font-weight="bold">▶️ Web Playback API</text>
    <text x="930" y="360" font-size="11" fill="#b3b3b3" text-anchor="middle">Play/Pause Control</text>
    <text x="930" y="375" font-size="11" fill="#b3b3b3" text-anchor="middle">Volume Control</text>
    <text x="930" y="390" font-size="11" fill="#b3b3b3" text-anchor="middle">Playback State</text>
    
    <!-- Auth Endpoints -->
    <rect x="790" y="430" width="280" height="100" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="930" y="455" font-size="14" fill="white" text-anchor="middle" font-weight="bold">🔑 Auth Endpoints</text>
    <text x="930" y="480" font-size="11" fill="#b3b3b3" text-anchor="middle">/authorize</text>
    <text x="930" y="495" font-size="11" fill="#b3b3b3" text-anchor="middle">/callback</text>
    <text x="930" y="510" font-size="11" fill="#b3b3b3" text-anchor="middle">/token refresh</text>
    
    <!-- Response Format -->
    <rect x="790" y="550" width="280" height="100" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="930" y="575" font-size="14" fill="white" text-anchor="middle" font-weight="bold">📊 JSON Responses</text>
    <text x="930" y="600" font-size="11" fill="#b3b3b3" text-anchor="middle">Track Metadata</text>
    <text x="930" y="615" font-size="11" fill="#b3b3b3" text-anchor="middle">Album Info</text>
    <text x="930" y="630" font-size="11" fill="#b3b3b3" text-anchor="middle">Artist Details</text>
    
    <!-- Rate Limiting -->
    <rect x="790" y="670" width="280" height="100" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="930" y="695" font-size="14" fill="white" text-anchor="middle" font-weight="bold">⏱️ Rate Limiting</text>
    <text x="930" y="720" font-size="11" fill="#b3b3b3" text-anchor="middle">Request Throttling</text>
    <text x="930" y="735" font-size="11" fill="#b3b3b3" text-anchor="middle">Quota Management</text>
    <text x="930" y="750" font-size="11" fill="#b3b3b3" text-anchor="middle">Refresh Token</text>
  </g>
  
  <!-- Integration Info -->
  <g id="integration">
    <rect x="1130" y="120" width="240" height="800" fill="#282828" stroke="#1DB954" stroke-width="2" rx="8"/>
    <text x="1250" y="160" font-size="18" fill="#1DB954" text-anchor="middle" font-weight="bold">Integration</text>
    
    <!-- Language Composition -->
    <rect x="1150" y="190" width="200" height="140" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="1250" y="215" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Language Mix</text>
    <text x="1250" y="240" font-size="11" fill="#1DB954" text-anchor="middle">JavaScript: 89.3%</text>
    <text x="1250" y="260" font-size="11" fill="#FFD700" text-anchor="middle">CSS: 8.5%</text>
    <text x="1250" y="280" font-size="11" fill="#E34C26" text-anchor="middle">HTML: 2.2%</text>
    
    <!-- Communication -->
    <rect x="1150" y="350" width="200" height="120" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="1250" y="375" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Communication</text>
    <text x="1250" y="400" font-size="11" fill="#b3b3b3" text-anchor="middle">HTTP/REST</text>
    <text x="1250" y="420" font-size="11" fill="#b3b3b3" text-anchor="middle">JSON Format</text>
    <text x="1250" y="440" font-size="11" fill="#b3b3b3" text-anchor="middle">Bearer Token</text>
    
    <!-- Key Features -->
    <rect x="1150" y="490" width="200" height="180" fill="#1DB954" opacity="0.1" rx="6"/>
    <text x="1250" y="515" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Key Features</text>
    <text x="1250" y="540" font-size="10" fill="#b3b3b3" text-anchor="middle">✓ Real-time Search</text>
    <text x="1250" y="560" font-size="10" fill="#b3b3b3" text-anchor="middle">✓ Music Playback</text>
    <text x="1250" y="580" font-size="10" fill="#b3b3b3" text-anchor="middle">✓ User Profiles</text>
    <text x="1250" y="600" font-size="10" fill="#b3b3b3" text-anchor="middle">✓ Playlists</text>
    <text x="1250" y="620" font-size="10" fill="#b3b3b3" text-anchor="middle">✓ Responsive</text>
    <text x="1250" y="640" font-size="10" fill="#b3b3b3" text-anchor="middle">✓ Secure Auth</text>
  </g>
</svg>