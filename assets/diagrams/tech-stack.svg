<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <radialGradient id="ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1DB954" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1DB954" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- title -->
  <g transform="translate(40 36)">
    <circle cx="14" cy="14" r="14" fill="#1DB954"/>
    <path d="M6 12 q8 -3 16 0 M7 16 q7 -2.5 14 0 M8 20 q6 -2 12 0" stroke="#000" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <text x="38" y="20" fill="#ffffff" font-size="20" font-weight="800">Tech Stack</text>
    <text y="42" fill="#B3B3B3" font-size="12">Frontend · Backend · Auth · External APIs</text>
  </g>

  <!-- 4 columns of pills -->
  <!-- Frontend -->
  <g transform="translate(60 90)">
    <rect width="280" height="600" rx="18" fill="#0E1D2A" stroke="#3D5BDB" stroke-width="1.5"/>
    <rect width="280" height="46" rx="18" fill="#1F3470"/>
    <text x="20" y="30" fill="#ffffff" font-size="14" font-weight="800">FRONTEND</text>
    <text x="260" y="30" fill="#9FB1FF" font-size="11" font-weight="700" text-anchor="end">React · 89.3% JS</text>

    <g transform="translate(20 70)" font-size="13">
      <g><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">⚛️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">React 18</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Component-based UI</text>
      </g>
      <g transform="translate(0 56)"><rect width="36" height="36" rx="9" fill="#1572B6"/><text x="18" y="24" text-anchor="middle" font-size="13" font-weight="900" fill="#fff">CSS</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">CSS3 / Tailwind</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Responsive styling</text>
      </g>
      <g transform="translate(0 112)"><rect width="36" height="36" rx="9" fill="#E34C26"/><text x="18" y="24" text-anchor="middle" font-size="13" font-weight="900" fill="#fff">JS</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">JavaScript ES2022</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Async / await · modules</text>
      </g>
      <g transform="translate(0 168)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🌐</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Axios</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">HTTP client + interceptors</text>
      </g>
      <g transform="translate(0 224)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🧭</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">React Router</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Client-side routes</text>
      </g>
      <g transform="translate(0 280)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🎚️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Web Audio API</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Visualizers · volume</text>
      </g>
      <g transform="translate(0 336)"><rect width="36" height="36" rx="9" fill="#1DB954"/><text x="18" y="24" text-anchor="middle" font-size="16">▶️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Web Playback SDK</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Streaming inside browser</text>
      </g>
      <g transform="translate(0 392)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🔧</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Webpack / Vite</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Bundler · HMR</text>
      </g>
    </g>
  </g>

  <!-- Backend -->
  <g transform="translate(360 90)">
    <rect width="280" height="600" rx="18" fill="#0E1F15" stroke="#1DB954" stroke-width="1.5"/>
    <rect width="280" height="46" rx="18" fill="#0F6B30"/>
    <text x="20" y="30" fill="#ffffff" font-size="14" font-weight="800">BACKEND</text>
    <text x="260" y="30" fill="#7CE9A4" font-size="11" font-weight="700" text-anchor="end">Node.js</text>

    <g transform="translate(20 70)" font-size="13">
      <g><rect width="36" height="36" rx="9" fill="#339933"/><text x="18" y="24" text-anchor="middle" font-size="16" fill="#fff">N</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Node.js 18+</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Server runtime</text>
      </g>
      <g transform="translate(0 56)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">⚡</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Express.js</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Routing &amp; middleware</text>
      </g>
      <g transform="translate(0 112)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🔁</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">CORS</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Cross-origin policy</text>
      </g>
      <g transform="translate(0 168)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">📦</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">body-parser</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">JSON ingest</text>
      </g>
      <g transform="translate(0 224)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🍪</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">cookie-session</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Token persistence</text>
      </g>
      <g transform="translate(0 280)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🪝</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">dotenv</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Env config</text>
      </g>
      <g transform="translate(0 336)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🧪</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Jest + Supertest</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Unit + route tests</text>
      </g>
      <g transform="translate(0 392)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">📜</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">winston / morgan</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Structured logging</text>
      </g>
    </g>
  </g>

  <!-- Auth & Data -->
  <g transform="translate(660 90)">
    <rect width="280" height="600" rx="18" fill="#1A0E22" stroke="#A56AC9" stroke-width="1.5"/>
    <rect width="280" height="46" rx="18" fill="#5B2A6E"/>
    <text x="20" y="30" fill="#ffffff" font-size="14" font-weight="800">AUTH &amp; DATA</text>
    <text x="260" y="30" fill="#D9B1F0" font-size="11" font-weight="700" text-anchor="end">OAuth 2.0</text>

    <g transform="translate(20 70)" font-size="13">
      <g><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🔐</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">OAuth 2.0 PKCE</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Authorization Code flow</text>
      </g>
      <g transform="translate(0 56)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🪪</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">JWT</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Session token signing</text>
      </g>
      <g transform="translate(0 112)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">♻️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Token refresh</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Auto-renew on 401</text>
      </g>
      <g transform="translate(0 168)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🛡️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">helmet</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Security headers</text>
      </g>
      <g transform="translate(0 224)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🚦</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">express-rate-limit</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Anti-abuse</text>
      </g>
      <g transform="translate(0 280)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">💾</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">In-memory LRU</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Hot search cache 60s</text>
      </g>
      <g transform="translate(0 336)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🗃️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">SQLite (optional)</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Saved playlists</text>
      </g>
      <g transform="translate(0 392)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">📐</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Zod / Joi</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Schema validation</text>
      </g>
    </g>
  </g>

  <!-- External APIs -->
  <g transform="translate(960 90)">
    <rect width="280" height="600" rx="18" fill="#22150A" stroke="#E8A23A" stroke-width="1.5"/>
    <rect width="280" height="46" rx="18" fill="#6E3A1A"/>
    <text x="20" y="30" fill="#ffffff" font-size="14" font-weight="800">EXTERNAL APIs</text>
    <text x="260" y="30" fill="#FFD79A" font-size="11" font-weight="700" text-anchor="end">Spotify</text>

    <g transform="translate(20 70)" font-size="13">
      <g><rect width="36" height="36" rx="9" fill="#1DB954"/><text x="18" y="24" text-anchor="middle" font-size="16">🎵</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Spotify Web API</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Search · users · playlists</text>
      </g>
      <g transform="translate(0 56)"><rect width="36" height="36" rx="9" fill="#1DB954"/><text x="18" y="24" text-anchor="middle" font-size="16">▶️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Web Playback API</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Premium streaming</text>
      </g>
      <g transform="translate(0 112)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🔑</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Accounts Service</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">accounts.spotify.com</text>
      </g>
      <g transform="translate(0 168)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🖼️</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">CDN</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">i.scdn.co · p.scdn.co</text>
      </g>
      <g transform="translate(0 224)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">📊</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Audio Features</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Tempo · key · energy</text>
      </g>
      <g transform="translate(0 280)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🎯</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Recommendations</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Seed-based suggestions</text>
      </g>
      <g transform="translate(0 336)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🌍</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Browse / Markets</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Featured · new releases</text>
      </g>
      <g transform="translate(0 392)"><rect width="36" height="36" rx="9" fill="#23272F"/><text x="18" y="24" text-anchor="middle" font-size="16">🎤</text>
        <text x="48" y="16" fill="#ffffff" font-weight="800">Top Tracks / Artists</text>
        <text x="48" y="30" fill="#B3B3B3" font-size="10">Personalized for user</text>
      </g>
    </g>
  </g>

  <!-- footer note -->
  <text x="640" y="704" text-anchor="middle" fill="#666" font-size="10">All trademarks belong to their respective owners. This is an educational clone using the official Spotify Web API.</text>
</svg>
