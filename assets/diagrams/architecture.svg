<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1ED760"/>
      <stop offset="100%" stop-color="#0F8A3E"/>
    </linearGradient>
    <linearGradient id="lane-client" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A2D6B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1A2D6B" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lane-api" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B5E3C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1B5E3C" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lane-svc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B2A6E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5B2A6E" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lane-ext" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6E3A1A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6E3A1A" stop-opacity="0.1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1DB954"/>
    </marker>
    <marker id="arrow-back" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- title -->
  <g transform="translate(40 36)">
    <circle cx="14" cy="14" r="14" fill="#1DB954"/>
    <path d="M6 12 q8 -3 16 0 M7 16 q7 -2.5 14 0 M8 20 q6 -2 12 0" stroke="#000" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <text x="38" y="20" fill="#ffffff" font-size="20" font-weight="800">System Architecture</text>
    <text y="42" fill="#B3B3B3" font-size="12">Spotify Clone — request/response flow across four layers</text>
  </g>

  <!-- Lane labels -->
  <g font-size="11" font-weight="800" letter-spacing="2" fill="#888888">
    <text x="40" y="118">CLIENT</text>
    <text x="40" y="276">API</text>
    <text x="40" y="434">SERVICES</text>
    <text x="40" y="592">EXTERNAL</text>
  </g>

  <!-- Lane backgrounds -->
  <rect x="120" y="92"  width="1120" height="120" rx="14" fill="url(#lane-client)"/>
  <rect x="120" y="250" width="1120" height="120" rx="14" fill="url(#lane-api)"/>
  <rect x="120" y="408" width="1120" height="120" rx="14" fill="url(#lane-svc)"/>
  <rect x="120" y="566" width="1120" height="120" rx="14" fill="url(#lane-ext)"/>

  <!-- CLIENT boxes -->
  <g transform="translate(160 110)">
    <rect width="200" height="84" rx="12" fill="#181828" stroke="#3D5BDB" stroke-width="1.5"/>
    <text x="14" y="24" fill="#9FB1FF" font-size="10" font-weight="800">REACT · BROWSER</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Pages &amp; Components</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">Home · Search · Playlist</text>
  </g>
  <g transform="translate(388 110)">
    <rect width="200" height="84" rx="12" fill="#181828" stroke="#3D5BDB" stroke-width="1.5"/>
    <text x="14" y="24" fill="#9FB1FF" font-size="10" font-weight="800">PLAYBACK SDK</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Web Playback</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">EME · Connect device</text>
  </g>
  <g transform="translate(616 110)">
    <rect width="200" height="84" rx="12" fill="#181828" stroke="#3D5BDB" stroke-width="1.5"/>
    <text x="14" y="24" fill="#9FB1FF" font-size="10" font-weight="800">STATE</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Auth + Player</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">Tokens · queue · volume</text>
  </g>
  <g transform="translate(844 110)">
    <rect width="200" height="84" rx="12" fill="#181828" stroke="#3D5BDB" stroke-width="1.5"/>
    <text x="14" y="24" fill="#9FB1FF" font-size="10" font-weight="800">HTTP CLIENT</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Axios / fetch</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">JSON · interceptors</text>
  </g>

  <!-- API boxes -->
  <g transform="translate(160 268)">
    <rect width="200" height="84" rx="12" fill="#0F2918" stroke="#1DB954" stroke-width="1.5"/>
    <text x="14" y="24" fill="#7CE9A4" font-size="10" font-weight="800">EXPRESS · /api</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Route Handlers</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">/auth · /search · /me</text>
  </g>
  <g transform="translate(388 268)">
    <rect width="200" height="84" rx="12" fill="#0F2918" stroke="#1DB954" stroke-width="1.5"/>
    <text x="14" y="24" fill="#7CE9A4" font-size="10" font-weight="800">MIDDLEWARE</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">CORS · Body · Auth</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">Validates &amp; injects user</text>
  </g>
  <g transform="translate(616 268)">
    <rect width="200" height="84" rx="12" fill="#0F2918" stroke="#1DB954" stroke-width="1.5"/>
    <text x="14" y="24" fill="#7CE9A4" font-size="10" font-weight="800">CONTROLLERS</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Business Logic</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">Search · playlist · player</text>
  </g>
  <g transform="translate(844 268)">
    <rect width="200" height="84" rx="12" fill="#0F2918" stroke="#1DB954" stroke-width="1.5"/>
    <text x="14" y="24" fill="#7CE9A4" font-size="10" font-weight="800">ERROR HANDLER</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Normalized JSON</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">{ error, code, hint }</text>
  </g>

  <!-- SERVICES boxes -->
  <g transform="translate(160 426)">
    <rect width="200" height="84" rx="12" fill="#2A1530" stroke="#A56AC9" stroke-width="1.5"/>
    <text x="14" y="24" fill="#D9B1F0" font-size="10" font-weight="800">OAUTH 2.0</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Authorization Code</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">PKCE · scopes · state</text>
  </g>
  <g transform="translate(388 426)">
    <rect width="200" height="84" rx="12" fill="#2A1530" stroke="#A56AC9" stroke-width="1.5"/>
    <text x="14" y="24" fill="#D9B1F0" font-size="10" font-weight="800">TOKEN STORE</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Access &amp; Refresh</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">Auto-refresh on 401</text>
  </g>
  <g transform="translate(616 426)">
    <rect width="200" height="84" rx="12" fill="#2A1530" stroke="#A56AC9" stroke-width="1.5"/>
    <text x="14" y="24" fill="#D9B1F0" font-size="10" font-weight="800">SPOTIFY SERVICE</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">API Wrapper</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">Typed query helpers</text>
  </g>
  <g transform="translate(844 426)">
    <rect width="200" height="84" rx="12" fill="#2A1530" stroke="#A56AC9" stroke-width="1.5"/>
    <text x="14" y="24" fill="#D9B1F0" font-size="10" font-weight="800">CACHE</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">In-memory LRU</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">TTL 60s · search results</text>
  </g>

  <!-- EXTERNAL boxes -->
  <g transform="translate(160 584)">
    <rect width="200" height="84" rx="12" fill="#2E1B0E" stroke="#E8A23A" stroke-width="1.5"/>
    <text x="14" y="24" fill="#FFD79A" font-size="10" font-weight="800">SPOTIFY ACCOUNTS</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">/authorize · /token</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">accounts.spotify.com</text>
  </g>
  <g transform="translate(388 584)">
    <rect width="200" height="84" rx="12" fill="#2E1B0E" stroke="#E8A23A" stroke-width="1.5"/>
    <text x="14" y="24" fill="#FFD79A" font-size="10" font-weight="800">WEB API</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">/v1/search · /me</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">api.spotify.com</text>
  </g>
  <g transform="translate(616 584)">
    <rect width="200" height="84" rx="12" fill="#2E1B0E" stroke="#E8A23A" stroke-width="1.5"/>
    <text x="14" y="24" fill="#FFD79A" font-size="10" font-weight="800">PLAYER API</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">/me/player/*</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">play · pause · seek · vol</text>
  </g>
  <g transform="translate(844 584)">
    <rect width="200" height="84" rx="12" fill="#2E1B0E" stroke="#E8A23A" stroke-width="1.5"/>
    <text x="14" y="24" fill="#FFD79A" font-size="10" font-weight="800">CDN</text>
    <text x="14" y="48" fill="#ffffff" font-size="14" font-weight="800">Album art &amp; previews</text>
    <text x="14" y="68" fill="#B3B3B3" font-size="11">i.scdn.co · p.scdn.co</text>
  </g>

  <!-- Flow arrows down -->
  <g stroke="#1DB954" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M260 194 v74"/>
    <path d="M488 194 v74"/>
    <path d="M716 194 v74"/>
    <path d="M944 194 v74"/>

    <path d="M260 352 v74"/>
    <path d="M488 352 v74"/>
    <path d="M716 352 v74"/>
    <path d="M944 352 v74"/>

    <path d="M260 510 v74"/>
    <path d="M488 510 v74"/>
    <path d="M716 510 v74"/>
    <path d="M944 510 v74"/>
  </g>

  <!-- Right side: data flow numbered -->
  <g transform="translate(1080 110)" font-size="11">
    <rect width="160" height="558" rx="14" fill="#0F0F0F" stroke="#282828"/>
    <text x="14" y="24" fill="#1DB954" font-weight="800" letter-spacing="1">REQUEST FLOW</text>

    <g transform="translate(14 50)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">1</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">User clicks ▶</text>
      <text x="22" y="16" fill="#B3B3B3">React triggers action</text>
    </g>
    <g transform="translate(14 110)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">2</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">Axios → /api</text>
      <text x="22" y="16" fill="#B3B3B3">Bearer token attached</text>
    </g>
    <g transform="translate(14 170)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">3</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">Express routes it</text>
      <text x="22" y="16" fill="#B3B3B3">Auth middleware checks</text>
    </g>
    <g transform="translate(14 230)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">4</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">Service → cache?</text>
      <text x="22" y="16" fill="#B3B3B3">Hit returns instantly</text>
    </g>
    <g transform="translate(14 290)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">5</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">Spotify Web API</text>
      <text x="22" y="16" fill="#B3B3B3">Refresh on 401, retry</text>
    </g>
    <g transform="translate(14 350)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">6</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">JSON response</text>
      <text x="22" y="16" fill="#B3B3B3">Mapped to UI model</text>
    </g>
    <g transform="translate(14 410)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">7</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">Player SDK plays</text>
      <text x="22" y="16" fill="#B3B3B3">Audio via CDN preview</text>
    </g>
    <g transform="translate(14 470)">
      <circle r="12" fill="#1DB954"/>
      <text text-anchor="middle" y="4" fill="#000" font-size="11" font-weight="900">8</text>
      <text x="22" y="2" fill="#ffffff" font-weight="700">UI updates</text>
      <text x="22" y="16" fill="#B3B3B3">Now-playing reflects</text>
    </g>
  </g>
</svg>
